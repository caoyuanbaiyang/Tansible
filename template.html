<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <title>Tansible执行结果</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f4f9;
            color: #333;
            line-height: 1.5;
            letter-spacing: 0.02em;
        }
        .container {
            max-width: 2500px;
            margin: 0 auto;
            padding: 2rem;
        }
        h1 {
            font-size: 2.25rem;
            font-weight: 700;
            text-align: center;
            color: #2d3748;
            margin-bottom: 2rem;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            background-color: #fff;
        }
        th, td {
            border: 1px solid #e2e8f0;
            padding: 1rem;
            text-align: left;
        }
        th {
            background-color: #edf2f7;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.875rem;
        }
        tr:nth-child(even) {
            background-color: #f7fafc;
        }
        tr:hover {
            background-color: #edf2f7;
            transition: background-color 0.3s ease;
        }
        /* 执行结果为 failed 的行显示红色文字 */
        .failed-row {
            color: red;
        }
        .input-info {
            margin-bottom: 2rem;
            padding: 1rem;
            background-color: #edf2f7;
            border-radius: 0.375rem;
        }
        /* 筛选控件样式 */
        .filter-container {
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .filter-label {
            font-weight: 600;
            color: #2d3748;
        }
        #resultFilter {
            padding: 0.5rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.375rem;
            background-color: #fff;
            min-width: 180px;
            font-size: 0.9rem;
        }
        #resultFilter:focus {
            outline: none;
            border-color: #4299e1;
            box-shadow: 0 0 0 2px rgba(66, 153, 225, 0.25);
        }
        /* 新增：筛选结果行数样式 */
        .result-count {
            color: #4a5568;
            font-size: 0.9rem;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tansible执行结果</h1>
        <div class="input-info">
            <h2 class="text-xl font-bold mb-2">执行参数</h2>
            <p><strong>主机文件路径:</strong> {{host_file_path}}</p>
            <p><strong>群组文件路径:</strong> {{group_file_path}}</p>
            <p><strong>动作文件路径:</strong> {{action_file_path}}</p>
            <p><strong>并发线程数:</strong> {{max_workers}}</p>
        </div>

        <!-- 筛选控件 + 结果行数统计 -->
        <div class="filter-container">
            <label class="filter-label" for="resultFilter">筛选执行结果：</label>
            <select id="resultFilter">
                <option value="all">全部结果</option>
                <option value="success">成功</option>
                <option value="failed">失败</option>
            </select>
            <!-- 新增：筛选结果行数显示 -->
            <span class="result-count" id="resultCount">共 0 条结果</span>
        </div>

        <table>
            <thead>
                <tr>
                    <th style="width: 5%">执行结果</th>
                    <th style="width: 15%">任务</th>
                    <th style="width: 10%">模块名</th>
                    <th style="width: 15%">主机名</th>
                    <th style="width: 5%">执行秒数</th>
                    <th style="width: 50%">返回结果</th>
                </tr>
            </thead>
            <tbody id="resultTableBody">
                {{table_rows}}
            </tbody>
        </table>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const filterSelect = document.getElementById('resultFilter');
            const tableBody = document.getElementById('resultTableBody');
            const tableRows = tableBody.querySelectorAll('tr');
            const resultCountSpan = document.getElementById('resultCount');

            // 封装筛选和行数统计逻辑
            function filterResults() {
                const selectedValue = filterSelect.value;
                let visibleCount = 0;

                tableRows.forEach(row => {
                    const resultCell = row.querySelector('td:first-child');
                    if (!resultCell) return;
                    
                    const resultText = resultCell.textContent.trim().toLowerCase();
                    
                    if (selectedValue === 'all' || resultText === selectedValue) {
                        row.style.display = '';
                        visibleCount++; // 统计可见行数
                    } else {
                        row.style.display = 'none';
                    }
                });

                // 更新行数显示
                resultCountSpan.textContent = `共 ${visibleCount} 条结果`;
            }

            // 监听筛选变化
            filterSelect.addEventListener('change', filterResults);

            // 页面加载时初始化行数统计
            filterResults();
        });
    </script>
</body>
</html>
