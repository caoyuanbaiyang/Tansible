<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <title>Tansible执行结果</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f4f9;
            color: #333;
            line-height: 1.5;
            letter-spacing: 0.02em;
        }
        .container {
            max-width: 2500px;
            margin: 0 auto;
            padding: 2rem;
        }
        h1 {
            font-size: 2.25rem;
            font-weight: 700;
            text-align: center;
            color: #2d3748;
            margin-bottom: 2rem;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            background-color: #fff;
        }
        th, td {
            border: 1px solid #e2e8f0;
            padding: 1rem;
            text-align: left;
        }
        th {
            background-color: #edf2f7;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.875rem;
        }
        tr:nth-child(even) {
            background-color: #f7fafc;
        }
        tr:hover {
            background-color: #edf2f7;
            transition: background-color 0.3s ease;
        }
        /* 执行结果为 failed 的行显示红色文字 */
        .failed-row {
            color: red;
        }
        .input-info {
            margin-bottom: 2rem;
            padding: 1rem;
            background-color: #edf2f7;
            border-radius: 0.375rem;
        }
        /* 筛选控件样式 */
        .filter-container {
            margin-bottom: 1.5rem;
            display: flex;
            flex-wrap: wrap; /* 换行适配 */
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background-color: #f7fafc;
            border-radius: 0.375rem;
        }
        .filter-label {
            font-weight: 600;
            color: #2d3748;
            white-space: nowrap; /* 标签不换行 */
        }
        .filter-select {
            padding: 0.5rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.375rem;
            background-color: #fff;
            min-width: 100px;
            font-size: 0.9rem;
        }
        .filter-select:focus, .filter-input:focus {
            outline: none;
            border-color: #4299e1;
            box-shadow: 0 0 0 2px rgba(66, 153, 225, 0.25);
        }
        /* 文本筛选框样式 */
        .filter-input {
            padding: 0.5rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.375rem;
            background-color: #fff;
            min-width: 150px;
            font-size: 0.9rem;
        }
        /* 执行秒数数值输入框样式 */
        .second-input {
            min-width: 80px;
        }
        /* 筛选结果行数样式 */
        .result-count {
            color: #4a5568;
            font-size: 0.9rem;
            font-weight: 500;
            margin-left: auto; /* 靠右显示 */
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tansible执行结果</h1>
        <div class="input-info">
            <h2 class="text-xl font-bold mb-2">执行参数</h2>
            <p><strong>主机文件路径:</strong> {{host_file_path}}</p>
            <p><strong>群组文件路径:</strong> {{group_file_path}}</p>
            <p><strong>动作文件路径:</strong> {{action_file_path}}</p>
            <p><strong>并发线程数:</strong> {{max_workers}}</p>
        </div>

        <!-- 筛选控件 + 结果行数统计 -->
        <div class="filter-container">
            <label class="filter-label" for="resultFilter">筛选执行结果：</label>
            <select id="resultFilter" class="filter-select">
                <option value="all">全部结果</option>
                <option value="success">成功</option>
                <option value="failed">失败</option>
            </select>

            <label class="filter-label" for="taskFilter">任务：</label>
            <input type="text" id="taskFilter" class="filter-input" placeholder="模糊筛选任务名称">

            <label class="filter-label" for="moduleFilter">模块名：</label>
            <input type="text" id="moduleFilter" class="filter-input" placeholder="模糊筛选模块名">

            <label class="filter-label" for="hostFilter">主机名：</label>
            <input type="text" id="hostFilter" class="filter-input" placeholder="模糊筛选主机名">

            <!-- 新增执行秒数筛选 -->
            <label class="filter-label" for="secondCondition">执行秒数：</label>
            <select id="secondCondition" class="filter-select">
                <option value="none">不筛选</option>
                <option value="gt">大于</option>
                <option value="eq">等于</option>
                <option value="lt">小于</option>
            </select>
            <input type="number" id="secondValue" class="filter-input second-input" placeholder="输入数值" min="0">

            <label class="filter-label" for="resultContentFilter">返回结果：</label>
            <input type="text" id="resultContentFilter" class="filter-input" placeholder="模糊筛选返回结果">

            <!-- 筛选结果行数显示 -->
            <span class="result-count" id="resultCount">共 0 条结果</span>
        </div>

        <table>
            <thead>
                <tr>
                    <th style="width: 5%">执行结果</th>
                    <th style="width: 15%">任务</th>
                    <th style="width: 10%">模块名</th>
                    <th style="width: 15%">主机名</th>
                    <th style="width: 5%">执行秒数</th>
                    <th style="width: 50%">返回结果</th>
                </tr>
            </thead>
            <tbody id="resultTableBody">
                {{table_rows}}
            </tbody>
        </table>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 获取所有筛选控件
            const resultFilter = document.getElementById('resultFilter');
            const taskFilter = document.getElementById('taskFilter');
            const moduleFilter = document.getElementById('moduleFilter');
            const hostFilter = document.getElementById('hostFilter');
            const secondCondition = document.getElementById('secondCondition');
            const secondValue = document.getElementById('secondValue');
            const resultContentFilter = document.getElementById('resultContentFilter');
            const tableBody = document.getElementById('resultTableBody');
            const tableRows = tableBody.querySelectorAll('tr');
            const resultCountSpan = document.getElementById('resultCount');

            // 封装筛选和行数统计逻辑
            function filterResults() {
                // 获取所有筛选条件值（统一转小写，方便不区分大小写匹配）
                const resultValue = resultFilter.value.toLowerCase().trim();
                const taskValue = taskFilter.value.toLowerCase().trim();
                const moduleValue = moduleFilter.value.toLowerCase().trim();
                const hostValue = hostFilter.value.toLowerCase().trim();
                const contentValue = resultContentFilter.value.toLowerCase().trim();
                // 执行秒数筛选条件
                const secCondition = secondCondition.value;
                const secValue = parseFloat(secondValue.value) || 0;
                
                let visibleCount = 0;

                tableRows.forEach(row => {
                    // 获取每行的对应列文本（转小写）
                    const cells = row.querySelectorAll('td');
                    if (cells.length < 6) return; // 防止列数异常

                    const rowResult = cells[0].textContent.trim().toLowerCase();
                    const rowTask = cells[1].textContent.trim().toLowerCase();
                    const rowModule = cells[2].textContent.trim().toLowerCase();
                    const rowHost = cells[3].textContent.trim().toLowerCase();
                    // 执行秒数转数值（处理非数字情况）
                    const rowSecond = parseFloat(cells[4].textContent.trim()) || 0;
                    const rowContent = cells[5].textContent.trim().toLowerCase();

                    // 筛选条件判断（且关系：所有条件都满足才显示）
                    const isResultMatch = resultValue === 'all' || rowResult === resultValue;
                    const isTaskMatch = taskValue === '' || rowTask.includes(taskValue);
                    const isModuleMatch = moduleValue === '' || rowModule.includes(moduleValue);
                    const isHostMatch = hostValue === '' || rowHost.includes(hostValue);
                    const isContentMatch = contentValue === '' || rowContent.includes(contentValue);
                    // 执行秒数筛选判断
                    let isSecondMatch = true;
                    if (secCondition !== 'none') {
                        switch(secCondition) {
                            case 'gt':
                                isSecondMatch = rowSecond > secValue;
                                break;
                            case 'eq':
                                isSecondMatch = rowSecond === secValue;
                                break;
                            case 'lt':
                                isSecondMatch = rowSecond < secValue;
                                break;
                        }
                    }

                    // 所有条件都满足则显示，否则隐藏
                    if (isResultMatch && isTaskMatch && isModuleMatch && isHostMatch && isSecondMatch && isContentMatch) {
                        row.style.display = '';
                        visibleCount++;
                    } else {
                        row.style.display = 'none';
                    }
                });

                // 更新行数显示
                resultCountSpan.textContent = `共 ${visibleCount} 条结果`;
            }

            // 监听所有筛选控件的变化事件
            resultFilter.addEventListener('change', filterResults);
            taskFilter.addEventListener('input', filterResults);
            moduleFilter.addEventListener('input', filterResults);
            hostFilter.addEventListener('input', filterResults);
            secondCondition.addEventListener('change', filterResults);
            secondValue.addEventListener('input', filterResults); // 实时输入实时筛选
            resultContentFilter.addEventListener('input', filterResults);

            // 页面加载时初始化行数统计
            filterResults();
        });
    </script>
</body>
</html>
